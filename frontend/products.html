<!DOCTYPE html>

<html>

<head>
<title>Products</title>

<script>

function sendEvent(){

fetch('/log',{

method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({

user_id: "U" + Math.floor(Math.random()*1000),
page:"products",   // ← different from home
action:"view_product",   // ← different action
product_id: "P" + Math.floor(Math.random()*100),
device: ["mobile","desktop"][Math.floor(Math.random()*2)],
location: ["India","US","UK"][Math.floor(Math.random()*3)],
event_time: new Date().toISOString()

})

})

}

</script>

</head>

<body>

<h1>Products Page</h1>

<button onclick="sendEvent()">View Product</button>

</body>

</html>
